# Local test config for central-computer Mic 2.
# Keep this separate from config_mic2.yaml used on real Pis.
#
# Intentional differences from real Pi config:
#   - pi_id is fixed to "local" (explicit local test identity)
#   - audio_device is "MIC2" on purpose, so local tests show an expected
#     second process that reports audio failure when MIC2 is absent
#   - emotion_load is false (lighter local test startup)

# Device identity shown in receiver as Pi local / Mic 2.
pi_id: local
mic_id: 2
audio_device: 'MIC2'
ctrl_port: 9002

# Audio
sample_rate: 16000

# openSMILE
opensmile_interval: 0.5
opensmile_margin: 0.1

# Emotion
emotion_model: 'base'
emotion_load: false
emo_window: 2
emo_hop: 0.5
emo_decay_active: true
emo_decay_tau: 2.0
emo_zero_on_silence: false

# VAD
vad_active: true
vad_threshold: 0.3
vad_interval: 0.25
vad_grab_sec: 0.5
# VAD timeline/log grid is experiment-wide: config_features.yaml -> vad.grid_hz
emo_min_voiced_frac: 0.5

# Logging / streaming (on at launch for local debugging)
log_active: false
log_interval: 0.25
osc_active: true

# Display
display: false
display_n: 200
display_refresh_ms: 150

# OSC destination for local one-machine test
osc_ip: '127.0.0.1'
osc_port: 9000

# Self-telemetry
self_stats_interval: 5.0

# Processing toggles
prosody_active: true
emotion_active: false

# Output
output_dir: 'log_data'
