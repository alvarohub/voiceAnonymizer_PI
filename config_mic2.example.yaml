# ──────────────────────────────────────────────────
# TEMPLATE for the Mic 2 instance on a Pi.
#
# This file IS tracked in git. The real `config_mic2.yaml` is NOT —
# it's per-Pi (different audio_device, pi_id) and is in .gitignore.
#
# First-time setup on a new Pi:
#   cp config_mic2.example.yaml config_mic2.yaml
#   then edit pi_id and audio_device for this Pi's hardware.
# ──────────────────────────────────────────────────

# Device identity
pi_id: null # SET ME — e.g. 5 (null falls back to hostname)
mic_id: 2
audio_device: null # SET ME — substring of `python3 -m sounddevice` name
ctrl_port: 9002

# Audio
sample_rate: 16000

# openSMILE
opensmile_interval: 0.5
opensmile_margin: 0.1

# Emotion
emotion_load: true # Set false to skip loading the emotion model entirely on low-memory Pis. If false, emotion cannot be turned on later.
emo_window: 2
emo_hop: 0.5
emo_decay_active: true
emo_decay_tau: 2.0
emo_zero_on_silence: false

# VAD
vad_active: false
vad_threshold: 0.3
vad_interval: 0.25
vad_grab_sec: 0.5
vad_grid_hz: 100
emo_min_voiced_frac: 0.5

# Logging / streaming
log_active: false
log_interval: 0.25
osc_active: false

# Display
display: false
display_n: 200
display_refresh_ms: 150

# OSC
osc_ip: '127.0.0.1'
osc_port: 9000

# Self-telemetry
self_stats_interval: 5.0

# Processing toggles
prosody_active: false
emotion_active: false

# Model
emotion_model: 'base'

# Output
output_dir: 'output'
